<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICS Elite Money Book - Pro Fix</title>
  <style>
    :root {
      --retro-brown: #3e2723;
      --retro-paper: #f9f7f2;
      --retro-shadow: rgba(0, 0, 0, 0.25);
      --plus-green: #2d7a32;
      --plus-border: #1b4d1f;
      --minus-red: #c62828;
      --minus-border: #8e0000;
      --apple-red: #ff4d4d;
      --money-gold: #b8860b;
    }

    body {
      background: #d7c4a3;
      font-family: "Microsoft JhengHei", sans-serif;
      margin: 0; padding: 0; color: var(--retro-brown);
      min-height: 100vh; display: flex; overflow: hidden;
    }

    /* 左側：時鐘與排行 */
    .sidebar-left {
      width: 220px; background: rgba(255, 255, 255, 0.4);
      border-right: 2px solid var(--retro-brown); height: 100vh;
      display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; flex-shrink: 0;
      gap: 12px;
    }

    .date-container { text-align: center; }
    .today-date { font-weight: 900; font-size: 1em; background: #fff; border: 2px solid var(--retro-brown); padding: 5px; border-radius: 6px; display: block; }
    
    .digital-clock { 
      text-align: center; font-family: 'Courier New', monospace; font-size: 1.8em; font-weight: 900; 
      background: var(--retro-brown); color: #76ff03; padding: 10px 5px; border-radius: 6px; 
      box-shadow: inset 0 0 10px #000;
    }

    /* 修復：類比鐘面樣式 */
    .analog-clock { 
      width: 90px; height: 90px; background: white; border: 2.5px solid var(--retro-brown); 
      border-radius: 50%; margin: 5px auto; position: relative; flex-shrink: 0;
    }
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: var(--retro-brown); border-radius: 10px; transform: translateX(-50%); }
    .hour-hand { width: 4px; height: 25%; z-index: 3; }
    .min-hand { width: 3px; height: 35%; z-index: 2; }
    .sec-hand { width: 2px; height: 40%; background: red; z-index: 1; }
    .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; background: var(--retro-brown); border-radius: 50%; z-index: 4; }

    .rank-section { flex-grow: 1; overflow-y: auto; border-top: 2px solid var(--retro-brown); padding-top: 10px; }
    .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; margin: 5px 0; background: white; border-radius: 6px; font-size: 0.95em; font-weight: 900; border: 1.5px solid #bbb; }
    .crown { color: #fbc02d; font-size: 1.1em; margin-right: 2px; }

    /* 右側：功能按鈕 */
    .sidebar-right {
      width: 180px; height: 100vh; padding: 15px; box-sizing: border-box; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 10px; border-left: 1px dashed var(--retro-brown);
    }

    .control-panel { background: rgba(255,255,255,0.3); border-radius: 10px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    
    /* 中間：核心網格與計時器 */
    .main-wrapper {
      flex: 1; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
    }

    .big-timer-container {
        margin: 20px 0; position: relative; width: 170px; height: 170px; flex-shrink: 0;
    }
    .timer-svg { transform: rotate(-90deg); width: 170px; height: 170px; }
    .timer-bg { fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 12; }
    .timer-progress { 
        fill: none; stroke: var(--plus-green); stroke-width: 12; 
        stroke-linecap: round; stroke-dasharray: 496; stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear;
    }
    .timer-text-center {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: 'Courier New', monospace; font-size: 2.5em; font-weight: 900; cursor: pointer;
    }

    .main-content {
      width: 100%; overflow-y: auto; padding: 15px 25px; box-sizing: border-box;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
      gap: 15px; align-content: start;
    }

    .card { 
      background: var(--retro-paper); border: 2px solid var(--retro-brown); padding: 10px; 
      border-radius: 12px; display: flex; flex-direction: column; align-items: center; 
      box-shadow: 4px 4px 0 var(--retro-shadow); transition: 0.2s;
    }
    .name { font-size: 1.1em; font-weight: 900; margin-bottom: 3px; color: #333; cursor: pointer; }
    .score-area { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
    .score-val { font-size: 1.8em; font-weight: 900; }
    .score-pop { transform: scale(1.4); color: gold !important; }

    .btn-row { display: flex; gap: 5px; width: 100%; margin-top: 3px; }
    .btn-row button { 
      flex: 1; padding: 6px 0; font-weight: 900; border-radius: 6px; 
      border: 1.5px solid var(--retro-brown); cursor: pointer; font-size: 0.85em; 
      transition: all 0.05s; position: relative;
    }
    .btn-plus { background: var(--plus-green); color: white; box-shadow: 0 3px 0 var(--plus-border); }
    .btn-plus:active { top: 2px; box-shadow: 0 1px 0 var(--plus-border); }
    .btn-minus { background: #ffffff; color: var(--minus-red); box-shadow: 0 3px 0 var(--minus-border); }
    .btn-minus:active { top: 2px; box-shadow: 0 1px 0 var(--minus-border); }

    .btn-manage { background: #fff; border: 1.5px solid var(--retro-brown); padding: 8px; font-weight: 900; border-radius: 6px; cursor: pointer; font-size: 0.9em; box-shadow: 0 2px 0 var(--retro-brown); width: 100%; position: relative; }
    .btn-manage:active { top: 2px; box-shadow: 0 0px 0 var(--retro-brown); }
    .btn-manage.active { background: var(--plus-green); color: white; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--retro-brown); border-radius: 10px; }
  </style>
</head>
<body class="mode-apple">

  <aside class="sidebar-left">
    <div class="date-container">
      <span id="display-date" class="today-date">2026/03/18</span>
    </div>
    <div id="display-time" class="digital-clock">00:00:00</div>
    <div class="analog-clock">
      <div id="hour" class="hand hour-hand"></div>
      <div id="min" class="hand min-hand"></div>
      <div id="sec" class="hand sec-hand"></div>
      <div class="center-dot"></div>
    </div>
    <section class="rank-section" id="rank-list"></section>
    <div id="total-amount" style="padding: 12px; background: var(--retro-brown); color: white; border-radius: 8px; text-align: center; font-weight: 900; font-size: 1.1em;">🍎 0</div>
  </aside>

  <div class="main-wrapper">
    <div class="big-timer-container">
        <svg class="timer-svg" viewBox="0 0 180 180">
            <circle class="timer-bg" cx="90" cy="90" r="79"></circle>
            <circle id="timer-bar" class="timer-progress" cx="90" cy="90" r="79" stroke-dasharray="496"></circle>
        </svg>
        <div id="timer-display" class="timer-text-center" onclick="customTimer()">00:00</div>
    </div>
    <main id="student-grid" class="main-content"></main>
  </div>

  <aside class="sidebar-right">
    <div class="control-panel">
      <div style="display:flex; gap:4px;">
        <button id="md-apple" class="btn-manage active" onclick="switchMode('apple')">🍎</button>
        <button id="md-money" class="btn-manage" onclick="switchMode('money')">💰</button>
      </div>
    </div>

    <div class="control-panel">
        <button class="btn-manage" onclick="exportData()">💾 備份資料</button>
        <button class="btn-manage" onclick="importData()">📂 還原資料</button>
        <button class="btn-manage" onclick="addNewStudent()">➕ 新增學生</button>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
        <div class="control-panel">
            <div style="display:flex; gap:4px;">
                <button id="cls-Chinese" class="btn-manage" onclick="switchClass('Chinese')">中文</button>
                <button id="cls-ICS" class="btn-manage active" onclick="switchClass('ICS')">ICS</button>
            </div>
        </div>

        <div class="control-panel" style="background:rgba(0,0,0,0.1)">
            <div style="display:flex; gap:4px;">
                <button id="timer-start" class="btn-manage" style="background:var(--plus-green); color:white;" onclick="toggleTimer()">GO</button>
                <button class="btn-manage" style="background:var(--minus-red); color:white;" onclick="resetTimer()">C</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                <button class="btn-manage" onclick="addTime(30)">+30s</button>
                <button class="btn-manage" onclick="addTime(60)">+1m</button>
            </div>
        </div>
        <button class="btn-manage" style="color:red;" onclick="resetScores()">⚠️ 全班歸零</button>
    </div>
  </aside>

  <script>
    const initialNames = {
      'Chinese': ['Allen', 'Mini', 'Lawrence', 'Sharon', 'Yenyen', 'Coco', 'Ivy', 'Kimi'],
      'ICS': ['YenYen', 'Lawrence', 'Coco', 'Ivy', 'Jasper', 'Angela', 'Eddie', 'Kimi', 'Polly', 'Anna', 'Amy', 'Ryan', 'Ada', 'Emma']
    };

    const KEY = 'ICS_DESKTOP_FINAL';
    let studentsData = JSON.parse(localStorage.getItem(KEY));
    let currentClass = 'ICS', currentMode = 'apple', timeLeft = 0, totalStartTime = 0, timerId = null;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol=0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    const soundPlus = () => playTone(880, 'sine', 0.2);
    const soundMinus = () => playTone(440, 'triangle', 0.2);
    const soundAlarm = () => { playTone(660, 'square', 0.3); setTimeout(() => playTone(660, 'square', 0.3), 400); };

    function init() {
      if (!studentsData) {
        studentsData = {};
        for (let cls in initialNames) {
          studentsData[cls] = initialNames[cls].map(name => ({ name, apples: 0, money: 0 }));
        }
        save();
      }
      setInterval(updateClocks, 1000);
      updateClocks();
      render();
      updateDates();
    }

    function updateDates() {
      document.getElementById('display-date').innerText = new Date().toLocaleDateString('zh-TW');
    }

    // 修復：指針時鐘邏輯
    function updateClocks() {
      const now = new Date();
      const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
      const sDeg = s * 6, mDeg = m * 6 + s * 0.1, hDeg = (h % 12) * 30 + m * 0.5;
      document.getElementById('sec').style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
      document.getElementById('min').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
      document.getElementById('hour').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
      document.getElementById('display-time').innerText = now.toTimeString().split(' ')[0];
    }

    function updateScore(idx, amt) {
      if (amt > 0) soundPlus(); else soundMinus();
      const key = currentMode === 'apple' ? 'apples' : 'money';
      studentsData[currentClass][idx][key] += amt;
      const scoreEl = document.getElementById(`score-${idx}`);
      scoreEl.innerText = studentsData[currentClass][idx][key];
      scoreEl.classList.remove('score-pop');
      void scoreEl.offsetWidth; 
      scoreEl.classList.add('score-pop');
      setTimeout(() => scoreEl.classList.remove('score-pop'), 200);
      save(); renderRank();
    }

    function render() {
      const grid = document.getElementById('student-grid');
      grid.innerHTML = '';
      studentsData[currentClass].forEach((s, i) => {
        const val = currentMode === 'apple' ? s.apples : s.money;
        const icon = currentMode === 'apple' ? '🍎' : '💰';
        grid.innerHTML += `
          <div class="card">
            <div class="name" onclick="editName(${i})">${s.name}</div>
            <div class="score-area">
              <span style="font-size:1.4em;">${icon}</span>
              <span id="score-${i}" class="score-val" style="color:${currentMode==='apple'?'var(--apple-red)':'var(--money-gold)'}">${val}</span>
            </div>
            <div class="btn-row">
              <button class="btn-plus" onclick="updateScore(${i},1)">+1</button>
              <button class="btn-plus" onclick="updateScore(${i},3)">+3</button>
              <button class="btn-plus" onclick="updateScore(${i},5)">+5</button>
            </div>
            <div class="btn-row">
              <button class="btn-minus" onclick="updateScore(${i},-1)">-1</button>
              <button class="btn-minus" onclick="updateScore(${i},-3)">-3</button>
              <button class="btn-minus" onclick="updateScore(${i},-5)">-5</button>
            </div>
          </div>`;
      });
      renderRank();
    }

    function renderRank() {
      const key = currentMode === 'apple' ? 'apples' : 'money';
      const sorted = [...studentsData[currentClass]].sort((a, b) => b[key] - a[key]);
      document.getElementById('rank-list').innerHTML = sorted.map((s, i) => {
        let crown = i < 3 ? '<span class="crown">👑</span>' : '';
        return `<div class="rank-item"><span>${crown}${i+1}.${s.name}</span><strong>${s[key]}</strong></div>`;
      }).join('');
      const total = studentsData[currentClass].reduce((sum, s) => sum + s[key], 0);
      document.getElementById('total-amount').innerText = (currentMode==='apple'?'🍎 ':'💰 ') + total;
    }

    function toggleTimer() { 
        const btn = document.getElementById('timer-start'); 
        if (timerId) { 
            clearInterval(timerId); timerId = null; btn.innerText = "GO"; 
        } else if (timeLeft > 0) { 
            if(totalStartTime === 0) totalStartTime = timeLeft;
            btn.innerText = "||"; 
            timerId = setInterval(() => { 
                timeLeft--; updateTimerDisplay(); 
                if (timeLeft <= 0) { clearInterval(timerId); timerId = null; btn.innerText = "GO"; soundAlarm(); alert("時間到！"); } 
            }, 1000); 
        } 
    }
    function resetTimer() { clearInterval(timerId); timerId = null; timeLeft = 0; totalStartTime = 0; updateTimerDisplay(); }
    function addTime(s) { timeLeft += s; totalStartTime = Math.max(totalStartTime, timeLeft); updateTimerDisplay(); }
    function updateTimerDisplay() { 
        document.getElementById('timer-display').innerText = `${String(Math.floor(timeLeft/60)).padStart(2,'0')}:${String(timeLeft%60).padStart(2,'0')}`;
        const bar = document.getElementById('timer-bar');
        const offset = totalStartTime > 0 ? 496 * (1 - timeLeft / totalStartTime) : 0;
        bar.style.strokeDashoffset = offset;
    }
    function customTimer() { const m = prompt("幾分鐘？", "1"); if(m) { timeLeft = parseInt(m)*60; totalStartTime = timeLeft; updateTimerDisplay(); } }

    function save() { localStorage.setItem(KEY, JSON.stringify(studentsData)); }
    function switchClass(cls) { currentClass = cls; document.querySelectorAll('[id^="cls-"]').forEach(b => b.classList.toggle('active', b.id === 'cls-'+cls)); render(); }
    function switchMode(mode) { currentMode = mode; document.querySelectorAll('[id^="md-"]').forEach(b => b.classList.toggle('active', b.id === 'md-'+mode)); render(); }
    function editName(idx) { const n = prompt("改名：", studentsData[currentClass][idx].name); if(n){ studentsData[currentClass][idx].name=n; save(); render(); } }
    function addNewStudent() { const n = prompt("新名字："); if(n){ studentsData[currentClass].push({name:n, apples:0, money:0}); save(); render(); } }
    function resetScores() { if(confirm("確定全班歸零？")){ studentsData[currentClass].forEach(s=>s.apples=s.money=0); save(); render(); } }
    function exportData() { navigator.clipboard.writeText(btoa(encodeURIComponent(JSON.stringify(studentsData)))).then(()=>alert("代碼已複製")); }
    function importData() { const code = prompt("貼入代碼："); if(code) { try { studentsData = JSON.parse(decodeURIComponent(atob(code))); save(); render(); } catch(e){ alert("錯誤"); } } }

    init();
  </script>
</body>
</html>
