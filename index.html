<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICS Elite - Audio Fixed</title>
  <style>
    :root {
      --retro-brown: #3e2723;
      --retro-paper: #f9f7f2;
      --retro-shadow: rgba(0, 0, 0, 0.25);
      --plus-green: #2d7a32;
      --plus-border: #1b4d1f;
      --minus-red: #c62828;
      --minus-border: #8e0000;
      --apple-red: #ff4d4d;
      --money-gold: #b8860b;
    }

    body {
      background: #d7c4a3;
      font-family: "Microsoft JhengHei", sans-serif;
      margin: 0; padding: 0; color: var(--retro-brown);
      height: 100vh; width: 100vw; display: flex; overflow: hidden;
    }

    .sidebar-left {
      width: 200px; height: 100vh; background: rgba(255, 255, 255, 0.4);
      border-right: 2px solid var(--retro-brown);
      display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; flex-shrink: 0;
    }

    .date-display { font-size: 0.85em; font-weight: 900; text-align: center; margin-bottom: 5px; line-height: 1.2; }
    .digital-clock { text-align: center; font-family: 'Courier New', monospace; font-size: 1.4em; font-weight: 900; background: var(--retro-brown); color: #76ff03; padding: 6px 4px; border-radius: 6px; margin-bottom: 5px; }

    .analog-clock { 
      width: 170px; height: 170px; background: white; border: 3px solid var(--retro-brown); 
      border-radius: 50%; margin: 5px auto; position: relative; flex-shrink: 0;
    }
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: var(--retro-brown); border-radius: 10px; transform: translateX(-50%); }
    .hour-hand { width: 5px; height: 25%; z-index: 3; }
    .min-hand { width: 3px; height: 38%; z-index: 2; }
    .sec-hand { width: 1.5px; height: 45%; background: red; z-index: 1; }
    .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: var(--retro-brown); border-radius: 50%; z-index: 4; }

    .rank-section { flex-grow: 1; overflow-y: auto; border-top: 2px solid var(--retro-brown); margin-top: 10px; }
    .rank-item { display: flex; justify-content: space-between; padding: 4px 6px; margin: 3px 0; background: white; border-radius: 4px; font-size: 0.85em; font-weight: 900; }

    .main-wrapper {
      flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    .big-timer-container {
        margin: 15px auto; position: relative; width: 220px; height: 220px; flex-shrink: 0;
    }
    .timer-svg { transform: rotate(-90deg); width: 220px; height: 220px; }
    .timer-bg { fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 12; }
    .timer-progress { 
        fill: none; stroke: var(--plus-green); stroke-width: 12; 
        stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear;
    }
    .timer-text-center {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: 'Courier New', monospace; font-size: 3.2em; font-weight: 900; cursor: pointer;
    }

    .main-content {
      flex: 1; 
      overflow-y: auto; padding: 10px 15px 40px; box-sizing: border-box;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px; align-content: start;
    }

    .sidebar-right {
      width: 180px; height: 100vh; padding: 10px; box-sizing: border-box; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-left: 1px dashed var(--retro-brown);
      overflow: hidden;
    }

    .spacer-top { height: 250px; flex-shrink: 0; } 

    .control-group { 
        display: flex; flex-direction: column; gap: 8px; 
        overflow-y: auto; 
        padding-bottom: 50px; 
    }
    .control-panel { background: rgba(255,255,255,0.3); border-radius: 8px; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
    
    .card { 
      background: var(--retro-paper); border: 2px solid var(--retro-brown); padding: 8px; 
      border-radius: 10px; display: flex; flex-direction: column; align-items: center; 
      box-shadow: 3px 3px 0 var(--retro-shadow);
    }
    .name { font-size: 1.1em; font-weight: 900; margin-bottom: 2px; cursor: pointer; }
    .score-area { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; font-weight: 900; }
    .score-val { font-size: 1.6em; }

    .btn-row { display: flex; gap: 3px; width: 100%; margin-top: 2px; }
    .btn-row button { 
      flex: 1; padding: 6px 0; font-weight: 900; border-radius: 4px; 
      border: 1.5px solid var(--retro-brown); cursor: pointer; font-size: 0.8em; 
      transition: 0.1s; position: relative;
    }
    .btn-plus { background: var(--plus-green); color: white; box-shadow: 0 2px 0 var(--plus-border); }
    .btn-minus { background: #fff; color: var(--minus-red); box-shadow: 0 2px 0 var(--minus-border); }
    .btn-row button:active { top: 2px; box-shadow: 0 0 0; }

    .btn-manage { background: #fff; border: 1.5px solid var(--retro-brown); padding: 6px; font-weight: 900; border-radius: 6px; cursor: pointer; font-size: 0.85em; box-shadow: 0 2px 0 var(--retro-brown); width: 100%; position: relative; }
    .btn-manage:active { top: 2px; box-shadow: 0 0px 0; }
    .btn-manage.active { background: var(--plus-green); color: white; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--retro-brown); border-radius: 10px; }
  </style>
</head>
<body>

  <aside class="sidebar-left">
    <div id="display-date" class="date-display">Wednesday<br>March 18, 2026</div>
    <div id="display-time" class="digital-clock">00:00:00</div>
    <div class="analog-clock">
      <div id="hour" class="hand hour-hand"></div>
      <div id="min" class="hand min-hand"></div>
      <div id="sec" class="hand sec-hand"></div>
      <div class="center-dot"></div>
    </div>
    <section class="rank-section" id="rank-list"></section>
    <div id="total-amount" style="padding: 8px; background: var(--retro-brown); color: white; border-radius: 6px; text-align: center; font-weight: 900;">🍎 0</div>
  </aside>

  <div class="main-wrapper">
    <div class="big-timer-container">
        <svg class="timer-svg" viewBox="0 0 220 220">
            <circle class="timer-bg" cx="110" cy="110" r="100"></circle>
            <circle id="timer-bar" class="timer-progress" cx="110" cy="110" r="100" stroke-dasharray="628"></circle>
        </svg>
        <div id="timer-display" class="timer-text-center" onclick="customTimer()">00:00</div>
    </div>
    <main id="student-grid" class="main-content"></main>
  </div>

  <aside class="sidebar-right">
    <div class="spacer-top"></div>
    <div class="control-group">
        <div class="control-panel">
          <div style="display:flex; gap:3px;">
            <button id="md-apple" class="btn-manage active" onclick="switchMode('apple')">🍎</button>
            <button id="md-money" class="btn-manage" onclick="switchMode('money')">💰</button>
          </div>
        </div>

        <div class="control-panel">
            <div style="display:flex; gap:3px;">
                <button id="cls-Chinese" class="btn-manage" onclick="switchClass('Chinese')">中文</button>
                <button id="cls-ICS" class="btn-manage active" onclick="switchClass('ICS')">ICS</button>
            </div>
        </div>

        <div class="control-panel" style="background:rgba(0,0,0,0.1)">
            <div style="display:flex; gap:3px;">
                <button id="timer-start" class="btn-manage" style="background:var(--plus-green); color:white;" onclick="toggleTimer()">GO</button>
                <button class="btn-manage" style="background:var(--minus-red); color:white;" onclick="resetTimer()">C</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:3px;">
                <button class="btn-manage" onclick="addTime(30)" style="font-size:0.75em">+30s</button>
                <button class="btn-manage" onclick="addTime(60)" style="font-size:0.75em">+1m</button>
            </div>
        </div>
        
        <button class="btn-manage" style="color:red; font-size:0.75em; padding:4px;" onclick="resetScores()">全班積分歸零</button>

        <div class="control-panel">
          <button class="btn-manage" onclick="addNewStudent()">➕ 新增學生</button>
          <div style="display:flex; gap:3px;">
              <button class="btn-manage" onclick="exportData()" style="font-size:0.7em">💾 備份</button>
              <button class="btn-manage" onclick="importData()" style="font-size:0.7em">📂 還原</button>
          </div>
        </div>
    </div>
  </aside>

  <script>
    const initialNames = {
      'Chinese': ['Allen', 'Mini', 'Lawrence', 'Sharon', 'Yenyen', 'Coco', 'Ivy', 'Kimi'],
      'ICS': ['YenYen', 'Lawrence', 'Coco', 'Ivy', 'Jasper', 'Angela', 'Eddie', 'Kimi', 'Polly', 'Anna', 'Amy', 'Ryan', 'Ada', 'Emma']
    };
    const KEY = 'ICS_DESKTOP_FINAL';
    let studentsData = JSON.parse(localStorage.getItem(KEY));
    let currentClass = 'ICS', currentMode = 'apple', timeLeft = 0, totalStartTime = 0, timerId = null;

    // 音效環境優化
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTone(freq, type, duration, vol=0.1) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    const soundPlus = () => playTone(880, 'sine', 0.2);
    const soundMinus = () => playTone(440, 'triangle', 0.2);
    const soundAlarm = () => { 
        playTone(660, 'square', 0.4); 
        setTimeout(() => playTone(660, 'square', 0.4), 500); 
    };

    function init() {
      if (!studentsData) {
        studentsData = {};
        for (let cls in initialNames) {
          studentsData[cls] = initialNames[cls].map(name => ({ name, apples: 0, money: 0 }));
        }
        save();
      }
      setInterval(updateClocks, 1000);
      updateClocks();
      render();
    }

    function getEnglishDate() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const today = new Date();
      const parts = today.toLocaleDateString('en-US', options).split(', ');
      return `${parts[0]}<br>${parts[1]}, ${parts[2]}`;
    }

    function updateClocks() {
      const now = new Date();
      const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
      document.getElementById('sec').style.transform = `translateX(-50%) rotate(${s*6}deg)`;
      document.getElementById('min').style.transform = `translateX(-50%) rotate(${m*6}deg)`;
      document.getElementById('hour').style.transform = `translateX(-50%) rotate(${(h%12)*30 + m*0.5}deg)`;
      document.getElementById('display-time').innerText = now.toTimeString().split(' ')[0];
      document.getElementById('display-date').innerHTML = getEnglishDate();
    }

    function updateScore(idx, amt) {
      amt > 0 ? soundPlus() : soundMinus();
      const key = currentMode === 'apple' ? 'apples' : 'money';
      studentsData[currentClass][idx][key] += amt;
      render(); save();
    }

    function render() {
      const grid = document.getElementById('student-grid');
      grid.innerHTML = '';
      studentsData[currentClass].forEach((s, i) => {
        const val = currentMode === 'apple' ? s.apples : s.money;
        const icon = currentMode === 'apple' ? '🍎' : '💰';
        const color = currentMode === 'apple' ? 'var(--apple-red)' : 'var(--money-gold)';
        grid.innerHTML += `
          <div class="card">
            <div class="name" onclick="editName(${i})">${s.name}</div>
            <div class="score-area">
              <span>${icon}</span>
              <span class="score-val" style="color:${color}">${val}</span>
            </div>
            <div class="btn-row">
              <button class="btn-plus" onclick="updateScore(${i},1)">+1</button>
              <button class="btn-plus" onclick="updateScore(${i},5)">+5</button>
            </div>
            <div class="btn-row">
              <button class="btn-minus" onclick="updateScore(${i},-1)">-1</button>
              <button class="btn-minus" onclick="updateScore(${i},-5)">-5</button>
            </div>
          </div>`;
      });
      renderRank();
    }

    function renderRank() {
      const key = currentMode === 'apple' ? 'apples' : 'money';
      const sorted = [...studentsData[currentClass]].sort((a, b) => b[key] - a[key]);
      document.getElementById('rank-list').innerHTML = sorted.map((s, i) => {
        let crown = i < 3 ? '👑' : '';
        return `<div class="rank-item"><span>${crown}${s.name}</span><strong>${s[key]}</strong></div>`;
      }).join('');
      const total = studentsData[currentClass].reduce((sum, s) => sum + s[key], 0);
      document.getElementById('total-amount').innerText = (currentMode==='apple'?'🍎 ':'💰 ') + total;
    }

    function toggleTimer() { 
        initAudio(); // 啟動音效環境
        const btn = document.getElementById('timer-start'); 
        if (timerId) { 
            clearInterval(timerId); 
            timerId = null; 
            btn.innerText = "GO"; 
        } else if (timeLeft > 0) { 
            if(totalStartTime === 0) totalStartTime = timeLeft;
            btn.innerText = "||"; 
            timerId = setInterval(() => { 
                timeLeft--; 
                updateTimerDisplay(); 
                if (timeLeft <= 0) { 
                    clearInterval(timerId); 
                    timerId = null; 
                    btn.innerText = "GO"; 
                    soundAlarm(); 
                    setTimeout(() => alert("時間到！"), 100);
                } 
            }, 1000); 
        } 
    }

    function resetTimer() { clearInterval(timerId); timerId = null; timeLeft = 0; totalStartTime = 0; updateTimerDisplay(); document.getElementById('timer-start').innerText = "GO"; }
    function addTime(s) { initAudio(); timeLeft += s; totalStartTime = Math.max(totalStartTime, timeLeft); updateTimerDisplay(); }
    function updateTimerDisplay() { 
        document.getElementById('timer-display').innerText = `${String(Math.floor(timeLeft/60)).padStart(2,'0')}:${String(timeLeft%60).padStart(2,'0')}`;
        const bar = document.getElementById('timer-bar');
        const offset = totalStartTime > 0 ? 628 * (1 - timeLeft / totalStartTime) : 0;
        bar.style.strokeDashoffset = offset;
    }
    function customTimer() { initAudio(); const m = prompt("分鐘？", "1"); if(m) { timeLeft = parseInt(m)*60; totalStartTime = timeLeft; updateTimerDisplay(); } }

    function save() { localStorage.setItem(KEY, JSON.stringify(studentsData)); }
    function switchClass(cls) { currentClass = cls; document.querySelectorAll('[id^="cls-"]').forEach(b => b.classList.toggle('active', b.id === 'cls-'+cls)); render(); }
    function switchMode(mode) { currentMode = mode; document.querySelectorAll('[id^="md-"]').forEach(b => b.classList.toggle('active', b.id === 'md-'+mode)); render(); }
    function editName(idx) { const n = prompt("改名：", studentsData[currentClass][idx].name); if(n){ studentsData[currentClass][idx].name=n; save(); render(); } }
    function addNewStudent() { const n = prompt("名字："); if(n){ studentsData[currentClass].push({name:n, apples:0, money:0}); save(); render(); } }
    function resetScores() { if(confirm("確定全班歸零？")){ studentsData[currentClass].forEach(s=>s.apples=s.money=0); save(); render(); } }
    function exportData() { navigator.clipboard.writeText(btoa(encodeURIComponent(JSON.stringify(studentsData)))).then(()=>alert("代碼已複製")); }
    function importData() { const code = prompt("貼入代碼："); if(code) { try { studentsData = JSON.parse(decodeURIComponent(atob(code))); save(); render(); } catch(e){ alert("格式錯誤"); } } }

    init();
  </script>
</body>
</html>
